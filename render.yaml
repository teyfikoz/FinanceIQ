services:
  - type: web
    name: fundpilot
    env: python
    region: oregon
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "False"
      - key: LOG_LEVEL
        value: INFO
      - key: API_PORT
        value: "8000"
      - key: PUBLIC_SITE_URL
        value: https://fundpilot.techsyncanalytica.com
      - key: SUPPORT_EMAIL
        value: techsyncanalytica@gmail.com
      - key: SECRET_KEY
        generateValue: true
      - key: BACKEND_CORS_ORIGINS
        value: https://fundpilot.techsyncanalytica.com,http://localhost:8000
      - key: FRED_API_KEY
        sync: false
      - key: TCMB_EVDS_API_KEY
        sync: false
      - key: COINGECKO_API_KEY
        sync: false
      - key: ALPHA_VANTAGE_API_KEY
        sync: false
      - key: FMP_API_KEY
        sync: false
